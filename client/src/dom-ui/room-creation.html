<div class="central-container room-creation-form popup">
    <div class="close-btn" onclick="closeForm()">✕</div>

    <h1>Create Game</h1>
    <form class="vertical-container">
        <div class="input-div">
            <label for="game-name">Game name</label>
            <input id="game-name" type="text" name="game-name" required>
        </div>

        <div class="input-div">
            <label for="password">Password (optional)</label>
            <input id="password" type="text" name="password">
        </div>

        <div class="input-div map-input-div">
            <label for="map-id">Map</label>
            <div class="map-card">
                <canvas class="map-preview" width="300" height="150"></canvas>
                <span class="map-name">No map selected</span>
                <input class="map-id" type="text" name="map-id" required>
            </div>
        </div>

        <button type="submit">Create</button>
    </form>
</div>
